version: '3.9'

services:
  api:
    build: .
    container_name: otp-api
    # environment:
    #   - ASPNETCORE_ENVIRONMENT=Development
    #   - Redis__ConnectionString=redis:6379
    #   - RabbitMq__Host=rabbitmq
    #   - RabbitMq__Username=guest
    #   - RabbitMq__Password=guest
    #   - Jwt__Key=${JWT_KEY}
    #   - Jwt__Issuer=OtpSystem
    #   - Jwt__Audience=OtpSystem
    #   - SmsConfiguration__SMS.ir__Uri=https://api.sms.ir
    #   - SmsConfiguration__SMS.ir__API_TOKEN=${SMS_API_TOKEN}
    #   - SmsConfiguration__SMS.ir__TemplateId=347022

    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"


  # postgres:
  #   image: postgres:16
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: otp
  #     POSTGRES_PASSWORD: otp123
  #     POSTGRES_DB: otpdb
  #   ports:
  #     - "5432:5432"

  rabbitmq:
    image: docker.arvancloud.ir/rabbitmq:3-management
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: otpsystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  kafka:
    image: docker.arvancloud.ir/apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:
  postgres_data:      # ← add this